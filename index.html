---
layout: default
title: "Danh sách bài đọc"
---
<section class="list-header">
  <div class="list-header-row">
    <div>
      <h1><span class="title-desktop">Danh sách bài đọc</span><span class="title-mobile">Bài đọc</span></h1>
      <p class="subtitle">Bấm vào bài để nghe đọc tiếng Việt</p>
    </div>
    <div class="header-actions">
      <a href="{{ '/upload' | relative_url }}" class="upload-link">+ Đọc PDF / PPTX</a>
      <a href="{{ '/api-docs' | relative_url }}" class="api-link">API</a>
    </div>
  </div>
</section>

<div class="list-toolbar hidden" id="list-toolbar">
  <span id="toolbar-count" class="toolbar-count"></span>
  <button id="btn-delete-all" class="delete-all-btn">🗑 Xóa tất cả bài API</button>
</div>

<ul id="post-list" class="post-list"></ul>
<div id="pagination" class="pagination"></div>

<!-- static post data for client-side merge -->
<script type="application/json" id="static-data">
[{% for post in site.posts %}{"title":{{ post.title | jsonify }},"url":{{ post.url | relative_url | jsonify }},"date":{{ post.date | date_to_xmlschema | jsonify }},"category":{{ post.category | default:"" | jsonify }},"excerpt":{{ post.excerpt | strip_html | truncate: 120 | jsonify }},"source":"static"}{% unless forloop.last %},{% endunless %}{% endfor %}]
</script>

<script>
(async function () {
  const PAGE_SIZE = 8;
  let allArticles = [];
  let currentPage = 1;

  // ── Load data ──
  const staticPosts = JSON.parse(document.getElementById('static-data').textContent);

  let apiArticles = [];
  try {
    const res = await fetch('/api/articles');
    if (res.ok) {
      const { articles } = await res.json();
      apiArticles = (articles || []).map(a => ({ ...a, source: 'api' }));
    }
  } catch (_) {}

  // merge & sort newest first
  allArticles = [...apiArticles, ...staticPosts].sort(
    (a, b) => new Date(b.date || b.created_at) - new Date(a.date || a.created_at)
  );

  renderPage(currentPage);
  updateToolbar();

  // ── Render ──
  function renderPage(page) {
    currentPage = page;
    const start = (page - 1) * PAGE_SIZE;
    const items = allArticles.slice(start, start + PAGE_SIZE);
    const list  = document.getElementById('post-list');
    list.innerHTML = '';
    items.forEach(a => list.appendChild(makeItem(a)));
    renderPagination(page, Math.ceil(allArticles.length / PAGE_SIZE));
  }

  function getProgress(url) {
    try { return JSON.parse(localStorage.getItem('lazy_tts_' + url)); } catch { return null; }
  }

  function makeItem(a) {
    const isApi    = a.source === 'api';
    const url      = isApi ? `/read/${a.id}` : a.url;
    const date     = new Date(a.date || a.created_at).toLocaleDateString('vi-VN',
      { day: '2-digit', month: '2-digit', year: 'numeric' });
    const cat      = a.category || '';
    const progress = getProgress(url);
    const hasProg  = progress && progress.chunk > 0 && progress.total > 0;
    const pct      = hasProg ? Math.round((progress.chunk / progress.total) * 100) : 0;

    const li = document.createElement('li');
    li.className = 'post-item';
    li.dataset.id = a.id || '';

    li.innerHTML = `
      <a href="${url}" class="post-link">
        <div class="post-meta">
          <time>${date}</time>
          ${cat ? `<span class="tag">${cat}</span>` : ''}
          ${isApi ? `<span class="tag tag-api">API</span>` : ''}
          ${hasProg ? `<span class="tag tag-playing">▶ đoạn ${progress.chunk + 1}/${progress.total}</span>` : ''}
        </div>
        <h2 class="post-item-title">${a.title}</h2>
        ${a.excerpt ? `<p class="post-excerpt">${a.excerpt}</p>` : ''}
        ${hasProg ? `<div class="item-progress-bar"><div class="item-progress-fill" style="width:${pct}%"></div></div>` : ''}
      </a>
      ${isApi ? `<button class="delete-item-btn" title="Xóa bài này" data-id="${a.id}" data-title="${a.title.replace(/"/g,'&quot;')}">×</button>` : ''}`;

    if (isApi) {
      li.querySelector('.delete-item-btn').addEventListener('click', e => {
        e.preventDefault();
        deleteOne(a.id, a.title);
      });
    }
    return li;
  }

  function renderPagination(current, total) {
    const el = document.getElementById('pagination');
    el.innerHTML = '';
    if (total <= 1) return;

    const pages = getPageNums(current, total);
    if (current > 1) el.appendChild(makePageBtn('←', current - 1));
    pages.forEach(p => {
      if (p === '…') {
        const s = document.createElement('span');
        s.className = 'page-ellipsis'; s.textContent = '…'; el.appendChild(s);
      } else {
        const btn = makePageBtn(p, p);
        if (p === current) btn.classList.add('active');
        el.appendChild(btn);
      }
    });
    if (current < total) el.appendChild(makePageBtn('→', current + 1));
  }

  function getPageNums(cur, total) {
    if (total <= 7) return Array.from({ length: total }, (_, i) => i + 1);
    if (cur <= 4)        return [1, 2, 3, 4, 5, '…', total];
    if (cur >= total - 3) return [1, '…', total-4, total-3, total-2, total-1, total];
    return [1, '…', cur-1, cur, cur+1, '…', total];
  }

  function makePageBtn(label, page) {
    const btn = document.createElement('button');
    btn.className = 'page-btn';
    btn.textContent = label;
    btn.addEventListener('click', () => {
      renderPage(page);
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });
    return btn;
  }

  function updateToolbar() {
    const apiCount = allArticles.filter(a => a.source === 'api').length;
    const toolbar  = document.getElementById('list-toolbar');
    if (apiCount === 0) { toolbar.classList.add('hidden'); return; }
    toolbar.classList.remove('hidden');
    document.getElementById('toolbar-count').textContent =
      `${allArticles.length} bài · ${apiCount} từ API`;
  }

  // ── Delete ──
  function getKey() {
    let k = sessionStorage.getItem('lazy_api_key');
    if (!k) {
      k = prompt('Nhập API Key:');
      if (k) sessionStorage.setItem('lazy_api_key', k.trim());
    }
    return k;
  }

  async function deleteOne(id, title) {
    if (!confirm(`Xóa bài "${title}"?`)) return;
    const key = getKey(); if (!key) return;
    const res = await fetch(`/api/articles/${id}`, {
      method: 'DELETE',
      headers: { Authorization: `Bearer ${key}` },
    });
    const data = await res.json();
    if (!res.ok) { alert(`Lỗi: ${data.error}`); return; }
    allArticles = allArticles.filter(a => a.id !== id);
    const totalPages = Math.ceil(allArticles.length / PAGE_SIZE);
    renderPage(Math.min(currentPage, totalPages || 1));
    updateToolbar();
  }

  document.getElementById('btn-delete-all').addEventListener('click', async () => {
    const apiCount = allArticles.filter(a => a.source === 'api').length;
    if (!confirm(`Xóa tất cả ${apiCount} bài từ API? Không thể hoàn tác.`)) return;
    const key = getKey(); if (!key) return;
    const res = await fetch('/api/articles', {
      method: 'DELETE',
      headers: { Authorization: `Bearer ${key}` },
    });
    const data = await res.json();
    if (!res.ok) { alert(`Lỗi: ${data.error}`); return; }
    allArticles = allArticles.filter(a => a.source !== 'api');
    renderPage(1);
    updateToolbar();
  });
})();
</script>
